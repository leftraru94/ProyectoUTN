<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal Alumno</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">
        
        <!-- Pantalla de Login -->
        <div id="loginView" class="card">
            <h2>🎓 Portal Alumno</h2>
            <p style="text-align: center; color: #94A3B8; font-size: 0.9rem;">Ingresa las credenciales provistas por recepción.</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="usuario">Usuario:</label>
                    <input type="text" id="usuario" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" required>
                </div>
                
                <button type="submit">Ingresar</button>
            </form>
            <div id="loadingLogin" style="display:none; text-align:center; margin-top:1rem; color:#FBBF24;">Verificando...</div>
        </div>

        <!-- Pantalla Dashboard -->
        <div id="dashboard">
            <h2 id="welcomeName">Hola!</h2>
            
            <div class="card">
                <h3>Completar Perfil</h3>
                <form id="perfilForm">
                    <div class="form-group">
                        <label for="datosExtra">DNI / Teléfono / Domicilio:</label>
                        <input type="text" id="datosExtra" required placeholder="Ej: DNI 123456 - Tel 555-1234">
                    </div>
                    <button type="submit">Guardar Datos</button>
                </form>
                <div id="loadingPerfil" style="display:none; text-align:center; margin-top:1rem; color:#FBBF24;">Guardando...</div>
            </div>

            <div class="card">
                <h3>Mi Estado</h3>
                <button class="btn-outline" onclick="verEstado('notas')">Ver Mis Notas</button>
                <button class="btn-outline" onclick="verEstado('inasistencias')">Ver Inasistencias</button>
                <button class="btn-outline" onclick="verEstado('deuda')">Ver Estado de Cuenta</button>
                
                <div class="status-box" id="statusBox">
                    <h3 id="statusTitle"></h3>
                    <p id="statusValue"></p>
                </div>
            </div>

            <div class="logout" onclick="logout()">Cerrar Sesión</div>
        </div>

    </div>

    <script src="js/app.js"></script>
</body>
</html>
